{% extends "escola/base.html" %}
    
{% block content %}
    <h2>Curso: {{ curso.nome }}</h2>

    <p><strong>Professor:</strong> {{ curso.professor.nome }}</p>

    <section>
        <h4>Alunos</h4>
        <ul>
            {% for aluno in curso.alunos.all %}
                <li>{{ aluno.nome }}</li>
            {% empty %}
                <li>Sem alunos inscritos</li>
            {% endfor %}
        </ul>
    </section>
{% endblock %}
